<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>순정만화 모델 코디쇼 ✨</title>
    <style>
        :root { --pink: #ffafcc; }
        body { 
            background: #fff5f8; display: flex; flex-direction: column; 
            align-items: center; font-family: sans-serif; padding: 20px;
        }

        /* 캐릭터 창: 여기서 사이즈를 맞춥니다 */
        .window {
            width: 320px; height: 550px; /* 창 크기 */
            border: 10px solid white; border-radius: 25px;
            overflow: hidden; background: white; position: relative;
            box-shadow: 0 15px 30px rgba(255,175,204,0.4);
        }

        /* 10명이 들어있는 이미지 */
        #sprite {
            position: absolute;
            width: 500%; height: 200%; /* 5열 2행 고정 */
            background-image: url('dresses.png');
            background-size: cover;
            background-position: 0% 0%;
            /* 쓱쓱 움직이는 마법의 효과 */
            transition: background-position 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 메뉴판 */
        .menu { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 10px; margin-top: 25px; width: 340px; 
        }
        button { 
            padding: 12px; border: none; border-radius: 15px; 
            background: white; color: #fb6f92; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.2s;
        }
        button:hover { background: var(--pink); color: white; transform: translateY(-3px); }
        .reset-btn { grid-column: span 2; background: #888; color: white; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 style="color: #fb6f92; text-shadow: 2px 2px white;">👑 모델핏 순정만화 코디 👑</h1>

    <div class="window">
        <div id="sprite"></div>
    </div>

    <div class="menu">
        <button onclick="move(0, 0)">1. 옐로 플라워</button>
        <button onclick="move(25, 0)">2. 데님 멜빵</button>
        <button onclick="move(50, 0)">3. 블루 줄무늬</button>
        <button onclick="move(75, 0)">4. 네이비 셔츠</button>
        <button onclick="move(100, 0)">5. 레드 도트</button>
        
        <button onclick="move(0, 100)">6. 이브닝 블루</button>
        <button onclick="move(25, 100)">7. 실크 화이트</button>
        <button onclick="move(50, 100)">8. 벨벳 그린</button>
        <button onclick="move(75, 100)">9. 전통 의상</button>
        <button onclick="move(100, 100)">10. 글리터 파티</button>

        <button class="reset-btn" onclick="location.reload()">처음으로 🧼</button>
    </div>

    <script>
        function move(x, y) {
            const sprite = document.getElementById('sprite');
            sprite.style.backgroundPosition = x + '% ' + y + '%';
        }
    </script>
</body>
</html>
