<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>순정만화 인형놀이 (보정판) 💖</title>
    <style>
        :root { --pink: #ffafcc; }
        body { background: #fff5f8; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; padding: 20px; }
        
        .game-container { display: flex; gap: 20px; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); flex-wrap: wrap; justify-content: center; }

        /* 캐릭터가 보이는 실제 구멍 */
        .viewport {
            width: 300px; height: 550px; border: 8px solid var(--pink); border-radius: 20px;
            overflow: hidden; background: white; position: relative;
        }

        /* 사진 본체 - transform으로 이동해서 오차가 적음 */
        #sprite {
            position: absolute;
            width: 500%; height: 200%; /* 5열 2행 */
            background-image: url('dresses.png');
            background-size: cover;
            background-repeat: no-repeat;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translate(0, 0);
        }

        /* 메뉴판 */
        .menu { width: 300px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 12px; background: #fff0f5; color: #fb6f92; font-weight: bold; cursor: pointer; }
        button:hover { background: var(--pink); color: white; }

        /* 미세조정 도구 (안 맞을 때만 사용하세요) */
        .debug-panel { margin-top: 20px; padding: 15px; background: #eee; border-radius: 15px; font-size: 12px; text-align: center; }
        .debug-panel button { padding: 5px 10px; background: #888; color: white; margin: 2px; }
    </style>
</head>
<body>

    <h1 style="color: #fb6f92;">✨ 모델핏 순정만화 코디 ✨</h1>

    <div class="game-container">
        <div class="viewport">
            <div id="sprite"></div>
        </div>

        <div class="menu">
            <button onclick="move(0, 0)">1. 옐로 플라워</button>
            <button onclick="move(-20, 0)">2. 데님 멜빵</button>
            <button onclick="move(-40, 0)">3. 블루 줄무늬</button>
            <button onclick="move(-60, 0)">4. 네이비 셔츠</button>
            <button onclick="move(-80, 0)">5. 레드 도트</button>
            
            <button onclick="move(0, -50)">6. 이브닝 블루</button>
            <button onclick="move(-20, -50)">7. 실크 화이트</button>
            <button onclick="move(-40, -50)">8. 벨벳 그린</button>
            <button onclick="move(-60, -50)">9. 전통 의상</button>
            <button onclick="move(-80, -50)">10. 글리터 파티</button>
        </div>
    </div>

    <div class="debug-panel">
        <p>캐릭터가 창에 안 맞으면 아래 버튼으로 위치를 맞추세요!</p>
        <button onclick="adjust('x', -0.5)">◀ 왼쪽</button>
        <button onclick="adjust('x', 0.5)">오른쪽 ▶</button>
        <button onclick="adjust('y', -0.5)">▲ 위로</button>
        <button onclick="adjust('y', 0.5)">아래로 ▼</button>
        <br>
        현재 위치 - X: <span id="posX">0</span>%, Y: <span id="posY">0</span>%
    </div>

    <script>
        let curX = 0;
        let curY = 0;

        function move(x, y) {
            curX = x;
            curY = y;
            update();
        }

        function adjust(axis, val) {
            if(axis === 'x') curX += val;
            else curY += val;
            update();
        }

        function update() {
            const sprite = document.getElementById('sprite');
            sprite.style.transform = `translate(${curX}%, ${curY}%)`;
            document.getElementById('posX').innerText = curX;
            document.getElementById('posY').innerText = curY;
        }
    </script>
</body>
</html>
