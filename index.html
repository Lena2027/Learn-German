<!DOCTYPE html>
<html lang="ko" style="background-color: #ffe4e1;"> <head>
    <meta charset="UTF-8">
    <title>모델핏 순정만화 코디 게임</title>
    <style>
        body { 
            margin: 0; padding: 20px; display: flex; flex-direction: column; 
            align-items: center; font-family: 'Malgun Gothic', sans-serif;
        }
        .container { 
            display: flex; gap: 30px; background: white; padding: 25px; 
            border-radius: 30px; border: 5px solid #ffafcc;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); flex-wrap: wrap;
        }
        .screen {
            position: relative; width: 350px; height: 600px;
            background: #fff; border-radius: 15px; overflow: hidden;
        }
        .layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .outfit { display: none; } /* 입히는 옷들은 처음에 숨김 */

        .menu { width: 250px; display: flex; flex-direction: column; gap: 20px; }
        .box { background: #fff0f5; padding: 15px; border-radius: 15px; border: 1px dashed #ff8fab; }
        button { 
            width: 100%; padding: 12px; margin-bottom: 8px; border: none; 
            border-radius: 10px; background: #ff8fab; color: white; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #ff4d6d; transform: scale(1.03); }
    </style>
</head>
<body>

    <h1 style="color: #d02090; text-shadow: 2px 2px white;">💖 모델핏 여주인공 코디하기 💖</h1>

    <div class="container">
        <div class="screen">
            <svg class="layer" viewBox="0 0 200 450">
                <path d="M 60 70 Q 60 10 100 10 Q 140 10 140 70 L 150 200 Q 100 180 50 200 Z" fill="#3e2723" />
                <rect x="88" y="220" width="10" height="200" rx="5" fill="#ffe0bd" /> 
                <rect x="102" y="220" width="10" height="200" rx="5" fill="#ffe0bd" />
                <path d="M 85 100 L 115 100 L 118 220 Q 100 225 82 220 Z" fill="#ffe0bd" />
                <path d="M 78 60 Q 78 95 100 95 Q 122 95 122 60 Q 122 35 100 35 Q 78 35 78 60" fill="#ffe0bd" />
                <ellipse cx="88" cy="65" rx="4" ry="6" fill="#333" /> <circle cx="87" cy="62" r="1.5" fill="white" />
                <ellipse cx="112" cy="65" rx="4" ry="6" fill="#333" /> <circle cx="111" cy="62" r="1.5" fill="white" />
                <path d="M 97 82 Q 100 85 103 82" stroke="#ff80ab" fill="none" stroke-width="1.5" stroke-linecap="round" />
                
                <path d="M 85 100 L 115 100 L 118 160 L 82 160 Z" fill="white" stroke="#eee" />
                <path d="M 82 210 L 118 210 L 120 235 L 100 220 L 80 235 Z" fill="white" stroke="#eee" />
            </svg>

            <svg id="top-pink" class="layer outfit" viewBox="0 0 200 450"><path d="M 80 100 L 120 100 L 130 165 L 70 165 Z" fill="#ff4d6d" /></svg>
            <svg id="bottom-purple" class="layer outfit" viewBox="0 0 200 450"><path d="M 82 210 L 118 210 L 140 320 L 60 320 Z" fill="#9d4edd" /></svg>
        </div>

        <div class="menu">
            <div class="box">
                <h3>👗 스타일 선택</h3>
                <button onclick="show('top-pink')">핑크 크롭탑</button>
                <button onclick="show('bottom-purple')">퍼플 스커트</button>
            </div>
            <button style="background:#888;" onclick="location.reload()">모두 벗기 🧼</button>
        </div>
    </div>

    <script>
        function show(id) { document.getElementById(id).style.display = 'block'; }
    </script>
</body>
</html>
