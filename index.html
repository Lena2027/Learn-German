<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>순정만화 인형놀이 💖</title>
    <style>
        body { background: #fff0f5; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
        .title { color: #ff8fab; }
        
        /* 캐릭터가 보이는 창 */
        .window {
            width: 350px; height: 550px; /* 한 명 크기 */
            border: 8px solid white; border-radius: 20px;
            overflow: hidden; background: white; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 10명이 들어있는 통이미지 */
        #sprite {
            position: absolute;
            width: 500%; height: 200%; /* 5열 2행이라서 크게 설정 */
            background-image: url('dresses.png');
            background-size: cover;
            background-position: 0% 0%;
            transition: 0.3s; /* 옷 갈아입을 때 슥슥 움직이는 효과 */
        }

        /* 버튼들 */
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; width: 350px; }
        button { 
            padding: 15px; border: none; border-radius: 10px; 
            background: white; color: #ff8fab; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        button:hover { background: #ffafcc; color: white; }
    </style>
</head>
<body>

    <h1 class="title">✨ 순정만화 모델 코디쇼 ✨</h1>

    <div class="window">
        <div id="sprite"></div>
    </div>

    <div class="menu">
        <button onclick="change(0, 0)">1. 옐로 플라워</button>
        <button onclick="change(25, 0)">2. 데님 멜빵</button>
        <button onclick="change(50, 0)">3. 블루 줄무늬</button>
        <button onclick="change(75, 0)">4. 네이비 셔츠</button>
        <button onclick="change(100, 0)">5. 레드 도트</button>
        
        <button onclick="change(0, 100)">6. 이브닝 블루</button>
        <button onclick="change(25, 100)">7. 실크 화이트</button>
        <button onclick="change(50, 100)">8. 벨벳 그린</button>
        <button onclick="change(75, 100)">9. 전통 의상</button>
        <button onclick="change(100, 100)">10. 글리터 파티</button>
    </div>

    <script>
        function change(x, y) {
            document.getElementById('sprite').style.backgroundPosition = x + '% ' + y + '%';
        }
    </script>
</body>
</html>
